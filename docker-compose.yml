version: '3.8'

services:
  # PostgreSQL + TimescaleDB 时序数据库
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: caiso_db
    environment:
      POSTGRES_USER: caiso
      POSTGRES_PASSWORD: caiso_password
      POSTGRES_DB: caiso_market
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - caiso_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caiso -d caiso_market"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caiso_backend
    environment:
      - DATABASE_URL=postgresql://caiso:caiso_password@db:5432/caiso_market
      - CAISO_NODE=SP15
      - CAISO_MARKET=RTM
      - FETCH_INTERVAL=300
    volumes:
      - ./backend:/app
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - caiso_network
    restart: unless-stopped

  # 数据获取 worker
  data_fetcher:
    build:
      context: ./backend
      dockerfile: Dockerfile.fetcher
    container_name: caiso_fetcher
    environment:
      - DATABASE_URL=postgresql://caiso:caiso_password@db:5432/caiso_market
      - CAISO_NODE=SP15
      - CAISO_MARKET=RTM
      - FETCH_INTERVAL=300
    depends_on:
      db:
        condition: service_healthy
    networks:
      - caiso_network
    restart: unless-stopped

  # 前端 Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: caiso_frontend
    environment:
      - API_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - caiso_network
    restart: unless-stopped

  # Nginx 反向代理（可选，生产环境建议启用）
  nginx:
    image: nginx:alpine
    container_name: caiso_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - caiso_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:

networks:
  caiso_network:
    driver: bridge